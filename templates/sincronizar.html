<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sincronización Masiva - TravelLog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>

        /* Centrado perfecto en pantalla completa */
        body {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            background: #ffffff;
            overflow: hidden;
            width: 100%;
            max-width: 500px;
        }

        .card-header-accent {
            background-color: #dc3545;
            height: 8px;
            width: 100%;
        }

        .upload-icon {
            font-size: 4rem;
            color: #dc3545;
            margin-bottom: 1.5rem;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        input[type="file"]::file-selector-button {
            background-color: #f8f9fa;
            color: #495057;
            border: 1px solid #dee2e6;
            border-radius: 50px;
            padding: 8px 20px;
            margin-right: 15px;
            transition: 0.2s;
            cursor: pointer;
            font-weight: 600;
        }

        input[type="file"]::file-selector-button:hover {
            background-color: #e9ecef;
        }

        .btn-upload {
            background: linear-gradient(45deg, #dc3545, #ff4d5a);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            padding: 14px;
            letter-spacing: 0.5px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }

        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 53, 69, 0.4);
            color: white;
        }

        .alert {
            border-radius: 12px;
            border: none;
            font-weight: 500;
        }

    </style>
</head>
<body>

    <div class="container p-3">
        <div class="row justify-content-center">
            <div class="col-12 d-flex justify-content-center">
                <div class="card p-4 p-md-5 text-center">
                    <div class="card-header-accent position-absolute top-0 start-0"></div>

                    <div class="upload-icon">
                        <i class="bi bi-cloud-arrow-up-fill"></i>
                    </div>

                    <h2 class="fw-bold mb-2" style="color: #2c3e50;">Sincronizar Catálogo</h2>
                    <p class="text-muted mb-4 px-3">
                        Importación masiva de destinos mediante archivos
                        <span class="badge bg-light text-dark border">.json</span> o
                        <span class="badge bg-light text-dark border">.csv</span>
                    </p>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show shadow-sm mb-4" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-5">
                            <div class="p-4 border border-2 border-dashed rounded-4 bg-light">
                                {{ form.archivo }}
                            </div>
                            <small class="text-muted mt-2 d-block">Asegúrate de que los nombres de los campos coincidan con el modelo.</small>
                        </div>

                        <div class="d-grid gap-3">
                            <button type="submit" class="btn btn-upload">
                                <i class="bi bi- lightning-charge-fill me-2"></i>Iniciar Carga Masiva
                            </button>
                            <a href="{% url 'home' %}" class="btn btn-link text-decoration-none text-muted fw-bold">
                                <i class="bi bi-arrow-left me-1"></i> Volver al Campamento
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
