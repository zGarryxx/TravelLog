{% extends 'base.html' %}

{% block content %}
<style>
    .upload-card { border: none; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); background: #ffffff; width: 100%; max-width: 500px; margin: 40px auto; }
    .upload-icon { font-size: 4rem; color: #dc3545; margin-bottom: 1.5rem; display: inline-block; animation: bounce 2s infinite; }
    @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }
    .btn-upload { background: linear-gradient(45deg, #dc3545, #ff4d5a); color: white; border: none; border-radius: 50px; font-weight: 700; padding: 14px; box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3); }
    .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(220, 53, 69, 0.4); color: white; }
</style>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 d-flex justify-content-center">
            <div class="upload-card p-4 p-md-5 text-center position-relative">
                <div class="upload-icon">
                    <i class="bi bi-cloud-arrow-up-fill"></i>
                </div>

                <h2 class="fw-bold mb-2" style="color: #2c3e50;">Sincronizar Catálogo</h2>
                <p class="text-muted mb-4 px-3">
                    Importación masiva mediante archivos
                    <span class="badge bg-light text-dark border">.json</span> o
                    <span class="badge bg-light text-dark border">.csv</span>
                </p>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-5 text-start">
                        <div class="p-4 border border-2 border-dashed rounded-4 bg-light">
                            {{ form.archivo }}
                        </div>
                        <small class="text-muted mt-2 d-block text-center">Asegúrate de que los campos coincidan con el modelo.</small>
                    </div>

                    <div class="d-grid gap-3">
                        <button type="submit" class="btn btn-upload">
                            <i class="bi bi-lightning-charge-fill me-2"></i>Iniciar Carga Masiva
                        </button>
                        <a href="{% url 'home' %}" class="btn btn-link text-decoration-none text-muted fw-bold">
                            <i class="bi bi-arrow-left me-1"></i> Volver al Campamento
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
