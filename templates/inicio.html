<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelLog - Tu Diario de Viajes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .hero-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
                        url('https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            color: white;
            text-align: center;
        }
        .btn-explorer {
            background-color: #20c997;
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px 30px;
            transition: 0.3s;
        }
        .btn-explorer:hover {
            background-color: #1aa179;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(32, 201, 151, 0.4);
        }
        .btn-outline-light {
            font-weight: 600;
            padding: 12px 30px;
            border-width: 2px;
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="container">
            <h1 class="display-2 fw-bold mb-3">TravelLog</h1>
            <p class="lead mb-5 fs-4">Descubre lugares increíbles, califica puntos de interés y crea tus propios itinerarios de viaje.</p>

            <div class="d-flex justify-content-center gap-3">
                <a href="{% url 'login' %}" class="btn btn-explorer btn-lg rounded-pill">Iniciar Sesión</a>
                <a href="{% url 'register' %}" class="btn btn-outline-light btn-lg rounded-pill">Registrarse</a>
            </div>
        </div>
    </div>

</body>
</html>
